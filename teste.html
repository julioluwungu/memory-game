<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom right, #050816, #14052E);
            color: #F5F5F5;
        }

        .login-container {
            width: 420px;
            background-color: #090D1F;
            border: 1px solid #8A3FFC;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(138, 63, 252, 0.25);
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border: 3px solid #8A3FFC;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            color: #8A3FFC;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #A1A1AA;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2A2F45;
            background-color: #111827;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #8A3FFC;
            box-shadow: 0 0 10px rgba(138, 63, 252, 0.4);
        }

        input::placeholder {
            color: #6B7280;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .options a {
            color: #9B4DFF;
            text-decoration: none;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background-color: #7B2FF7;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            background-color: #9B4DFF;
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #6B7280;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            width: 40%;
            height: 1px;
            background-color: #2A2F45;
            top: 50%;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .register-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            background: transparent;
            border: 1px solid #8A3FFC;
            color: #9B4DFF;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .register-btn:hover {
            background-color: rgba(123, 47, 247, 0.1);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #6B7280;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="login-container">

        <div class="icon">
            🔒
        </div>

        <h1>Bem-vindo!</h1>

        <p class="subtitle">
            Faça login para acessar sua conta
        </p>

        <form>

            <div class="input-group">
                <label>E-mail</label>

                <input 
                    type="email"
                    placeholder="Digite seu e-mail"
                >
            </div>

            <div class="input-group">
                <label>Senha</label>

                <input 
                    type="password"
                    placeholder="Digite sua senha"
                >
            </div>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Lembrar-me
                </label>

                <a href="#">
                    Esqueceu sua senha?
                </a>

            </div>

            <button class="login-btn">
                Entrar
            </button>

        </form>

        <div class="divider">
            ou
        </div>

        <button class="register-btn">
            Criar uma conta
        </button>

        <div class="footer">
            © 2026 SuaEmpresa. Todos os direitos reservados.
        </div>

    </div>

</body>
</html>
